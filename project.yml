name: Visitala
options:
  bundleIdPrefix: is.visitala
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES
    INFOPLIST_KEY_UIApplicationSceneManifestGeneration: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait

targets:
  Visitala:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: ViewModels
      - path: Views
      - path: Components
      - path: Extensions
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.visitala.app
        PRODUCT_NAME: Visitala
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
